# netlify.toml — SEO & Performance Configuration

[build]
  publish = "dist"
  command = "npm run build"

# ===== HEADERS =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ===== SPA REDIRECTS =====
[[redirects]]
  from = "/api/nabc/*"
  to = "https://agriapi.nabc.go.th/:splat"
  status = 200

[[redirects]]
  from = "/api/doae-npt/*"
  to = "https://nakhonpathom.doae.go.th/:splat"
  status = 200

[[redirects]]
  from = "/api/doae-hq/*"
  to = "https://www.doae.go.th/:splat"
  status = 200

[[redirects]]
  from = "/api/doae-esc/*"
  to = "https://esc.doae.go.th/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
