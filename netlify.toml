# netlify.toml â€” SEO & Performance Configuration

[build]
  publish = "dist"
  command = "npm run build:netlify"

# ===== HEADERS =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"



# ===== API PROXIES (via Netlify Functions) =====
# WordPress APIs (use wp-proxy.js function)
# Route pattern: /api/doae-{domain}/{path}

# RSS APIs (use rss-proxy.js function)  
# Route pattern: /api/rss/{feed_key}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
