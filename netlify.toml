# netlify.toml — SEO & Performance Configuration

[build]
  publish = "dist"
  command = "npm run build"

# ===== HEADERS =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"



# ===== API PROXIES (via Netlify Functions) =====
# WordPress APIs (use wp-proxy.js function)
# Route pattern: /api/doae-{domain}/{path}

# RSS APIs (use rss-proxy.js function)  
# Route pattern: /api/rss/{feed_key}

[[redirects]]
  from = "/api/rss/thairath"
  to = "https://www.thairath.co.th/rss/agriculture"
  status = 200

[[redirects]]
  from = "/api/rss/agrinewsthai"
  to = "https://www.agrinewsthai.com/feed"
  status = 200

[[redirects]]
  from = "/api/rss/moac"
  to = "http://www.opsmoac.go.th/all_rss/news-all-382791791793.xml"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
