# netlify.toml â€” SEO & Performance Configuration

[build]
  publish = "dist"
  command = "pnpm run build:netlify"

# ===== HEADERS =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.in https://gen.ai.kku.ac.th https://agriapi.nabc.go.th https://api-gateway.gistda.or.th https://nakhonpathom.doae.go.th https://esc.doae.go.th https://www.doae.go.th https://ictc.doae.go.th https://oil-price.bangchak.co.th https://*.openstreetmap.org https://*.basemaps.cartocdn.com https://*.arcgisonline.com https://api.open-meteo.com https://air-quality-api.open-meteo.com https://api.bigdatacloud.net https://app.rid.go.th https://mex.moc.go.th https://api.rss2json.com https://api.allorigins.win https://corsproxy.io; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://*.arcgisonline.com https://*.doae.go.th https://*.moac.go.th https://*.wikimedia.org https://res.cloudinary.com https://*.cloudinary.com https://cdnjs.cloudflare.com;"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"



# ===== API PROXIES (via Netlify Functions) =====
# WordPress APIs (use wp-proxy.js function)
# Route pattern: /api/doae-{domain}/{path}

# RSS APIs (use rss-proxy.js function)  
# Route pattern: /api/rss/{feed_key}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
