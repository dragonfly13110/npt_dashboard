name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build

    - name: Run Unit Tests
      run: npx vitest run --passWithNoTests

    # E2E Tests disabled — ต้องตั้ง GitHub Secrets ก่อน (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY)
