name: Scrape Farmer Registry Automatically

on:
  schedule:
    # Runs at 23:00 UTC every 3 days.
    # 23:00 UTC is 06:00 ICT (Thailand time) of the next day.
    # Therefore, it triggers at 06:00 AM ICT every 3 days.
    - cron: '0 23 */3 * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  scrape:
    name: Run Scraper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Random Delay (6:00 AM - 8:00 AM ICT)
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          # Generate a random sleep duration between 0 and 7200 seconds (2 hours)
          DELAY=$((RANDOM % 7200))
          echo "Delaying the scraper by $DELAY seconds to randomize retrieval time between 06:00 and 08:00 ICT..."
          sleep $DELAY

      - name: Run Scraper Script
        env:
          DOAE_USERNAME: ${{ secrets.DOAE_USERNAME }}
          DOAE_PASSWORD: ${{ secrets.DOAE_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/scrape_farmer_registry.js
